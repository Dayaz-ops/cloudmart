name: CD Pipeline

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Log in to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push Docker image
        run: |
          docker build \
            -t ${{ secrets.ACR_LOGIN_SERVER }}/cloudmart-app:latest \
            -t ${{ secrets.ACR_LOGIN_SERVER }}/cloudmart-app:${{ github.sha }} .
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/cloudmart-app:latest
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/cloudmart-app:${{ github.sha }}

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Delete existing container
        run: |
          az container delete \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --name cloudmart-container \
            --yes || true

      - name: Deploy to ACI
        run: |
          az container create \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --name cloudmart-container \
            --image ${{ secrets.ACR_LOGIN_SERVER }}/cloudmart-app:${{ github.sha }} \
            --registry-login-server ${{ secrets.ACR_LOGIN_SERVER }} \
            --registry-username ${{ secrets.ACR_USERNAME }} \
            --registry-password ${{ secrets.ACR_PASSWORD }} \
            --dns-name-label ${{ secrets.DNS_LABEL }} \
            --ports 80 \
            --os-type Linux \
            --cpu 1 \
            --memory 1.5 \
            --environment-variables COSMOS_ENDPOINT="${{ secrets.COSMOS_ENDPOINT }}" COSMOS_KEY="${{ secrets.COSMOS_KEY }}"
